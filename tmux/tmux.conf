###########################################
##  PREFIX = Alt+Space
############################################
unbind-key C-b
unbind-key Space
set-option -g prefix M-Space
bind-key M-Space send-prefix


######################################################
##	SOURCE
######################################################
# Ctrl + Alt + r
bind-key -Troot M-C-r source-file ~/.config/tmux/tmux.conf \; display-message "Sourced"

# Alt + r
bind-key -Troot M-r   source-file ~/.config/tmux/tmux.conf \; display-message "Sourced"

# Prefix + r
bind-key r            source-file ~/.config/tmux/tmux.conf \; display-message "Sourced"


############################################
##  GLOBAL OPTIONS
############################################
# Add the following to your tmux configuration file, 
# replacing XXX by the value of $TERM outside of tmux:
set-option -a terminal-features 'linux:RGB'
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g focus-events on
set-option -g mode-keys vi


######################################################
##	NAVIGATION
######################################################
bind-key -Troot M-| split-window -h
bind-key -Troot M-` split-window -h 	\; display-message "Alt+| TTY (M-`) split V"
bind-key -Troot M-- split-window -v
bind-key -Troot M-/ split-window -v     \; display-message "Alt+- TTY (M-/) split H" 

# Prefix+|/-    Works in non-gui and gui mode
bind-key      | split-window -h
bind-key      - split-window -v

bind-key -Troot M-h select-pane -L
bind-key -Troot M-j select-pane -D
bind-key -Troot M-k select-pane -U
bind-key -Troot M-l select-pane -R

# TTY resize bindings
bind-key -Troot M-y resize-pane -L 1
bind-key -Troot M-u resize-pane -D 1
bind-key -Troot M-i resize-pane -U 1
bind-key -Troot M-o resize-pane -R 1

bind-key -Troot M-H resize-pane -L 1
bind-key -Troot M-J resize-pane -D 1
bind-key -Troot M-K resize-pane -U 1
bind-key -Troot M-L resize-pane -R 1

bind-key -Troot M-n next-layout \; display-message "next-layout"

# Alt+m toggle monocle
bind-key -n M-m resize-pane -Z


############################################
##  WINDOWS
############################################
# Alt + w       New Window
bind-key -n M-w new-window

# Alt + 1234    Select Window
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4


############################################
##  COPY AND PASTE
############################################
# Alt+c     Enter Copy Mode
bind-key -n M-c copy-mode
# Alt+v:    Begin selection directly from normal mode
bind-key -n M-v copy-mode \; send-keys -X begin-selection
# when in copy-mode: v begin selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
# when in copy-mode: y yank and exit copy-mode
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Escape to cancel copy mode
bind-key -T copy-mode-vi Escape send-keys -X cancel
# Alt+p     Put in normal mode
bind-key -n M-p paste-buffer


############################################
##  STATUS LINE
############################################
set-option -g status-style bg=blue
# Same blue color as the default DWM bar
#set -g status-bg "#005577"
set -g status-bg "#222222"
# Same white color as the default DWM foreground
set -g status-fg "#eeeeee"
set -g status-left  "#[bg=#000000,fg=#eeeeee] #S "
set -g status-right "#[bg=#000000,fg=#eeeeee] %Y-%m-%d %H:%M %a "

bind-key B set-option -g status-style bg=blue
bind-key C set-option -g status-style bg=cyan
bind-key R set-option -g status-style bg=red
bind-key F set-option -g status off
bind-key O set-option -g status on


